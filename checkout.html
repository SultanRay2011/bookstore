<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - Bookstore</title>
  <link href="https://fonts.googleapis.com/css?family=Arial&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    /* Use your specified font family */
    body {
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    }
    /* Header styling */
    header {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }
    header h3 a {
      color: white;
      text-decoration: none;
      font-size: 1.8em;
    }
    header img {
      max-width: 80px;
      height: auto;
    }
    nav {
      margin-top: 10px;
    }
    nav a {
      margin: 0 15px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }
    nav a:hover {
      color: #ffeb3b;
    }
    /* Container for checkout form */
    .container {
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: white;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    label {
      margin-bottom: 5px;
      font-weight: bold;
    }
    input {
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      box-sizing: border-box;
    }
    button {
      padding: 10px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background-color: #45a049;
    }
    /* Cancel Payment button styling */
    .cancel-btn {
      background-color: #d9534f;
    }
    .cancel-btn:hover {
      background-color: #c9302c;
    }
    /* Modal styling for cancel confirmation */
    .modal {
      display: none; /* Hidden by default */
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.5); /* Black with opacity */
    }
    .modal-content {
      background-color: #fff;
      margin: 15% auto; /* Centered vertically and horizontally */
      padding: 20px;
      border: 1px solid #888;
      width: 80%;
      max-width: 400px;
      border-radius: 5px;
      text-align: center;
    }
    .modal-content p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }
    .modal-buttons {
      display: flex;
      justify-content: space-around;
    }
    .modal-buttons button {
      width: 40%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
    }
    .modal-buttons .yes-btn {
      background-color: #d9534f;
      color: white;
    }
    .modal-buttons .no-btn {
      background-color: #4CAF50;
      color: white;
    }
    .modal-buttons .yes-btn:hover {
      background-color: #c9302c;
    }
    .modal-buttons .no-btn:hover {
      background-color: #45a049;
    }
    footer {
      text-align: center;
      padding: 15px 0;
      background-color: #4CAF50;
      color: white;
      margin-top: 30px;
    }
    footer a {
      color: white;
      text-decoration: none;
      margin: 0 5px;
    }
    footer a:hover {
      text-decoration: underline;
    }
    p{
      text-align: center;
    }
  </style>
</head>
<body>
  <!-- Header with Navigation (no search bar here per instructions) -->
  <header>
    <div>
      <h3><a href="home.html">Bookstore</a></h3>
      <img src="favicon.png" alt="Bookstore">
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="feedback.html">Feedback</a>
      <a href="author.html">Authors</a>
      <a href="oscarawards.html">Oscar Awards</a>
    </nav>
  </header>
  
  <div class="container">
    <h1>Checkout</h1>
    <form>
      <p>We will never steal your card information. We respect your privacy 100%</p>
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="Enter your full name" required>

      <label for="card-number">Card Number</label>
      <input type="text" id="card-number" placeholder="1234 5678 9012 3456" required>

      <label for="expiry-date">Expiry Date</label>
      <input type="month" id="expiry-date" required>

      <label for="cvv">CVV</label>
      <input type="password" id="cvv" placeholder="123" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" required>
      
      <button onclick="window.location.href='checkoutsuccess.html'">Pay Now</button>
      <button type="button" class="cancel-btn" onclick="openModal()">Cancel Payment</button>
    </form>
  </div>
  
  <!-- Modal for Cancel Confirmation -->
  <div id="cancelModal" class="modal">
    <div class="modal-content">
      <p>Are you sure you want to cancel?</p>
      <div class="modal-buttons">
        <button class="yes-btn" onclick="confirmCancel()">Yes</button>
        <button class="no-btn" onclick="closeModal()">No</button>
      </div>
    </div>
  </div>
  
  <footer>
    <p>&copy; Bookstore Enterprise Limited 2025. <a href="privacypolicy.html">Privacy Policy</a> | <a href="availability.html">Available Countries</a></p>
  </footer>
  
  <script>
    // Modal functions for cancellation confirmation
    function openModal() {
      document.getElementById('cancelModal').style.display = 'block';
    }
    function closeModal() {
      document.getElementById('cancelModal').style.display = 'none';
    }
    function confirmCancel() {
      // Redirect to home page (or any page you prefer)
      window.location.href = 'home.html';
    }
  </script>
</body>
</html>
